name: Deploy Documentation

on:
  push:
    branches:
      - master
      - develop
    paths:
      - 'documentation/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          # Create the branch if it doesn't exist yet
          fetch-depth: 0
        continue-on-error: true

      - name: Initialise gh-pages if it doesn't exist
        run: |
          if [ ! -d gh-pages/.git ]; then
            git clone --no-local source gh-pages
            cd gh-pages
            git checkout --orphan gh-pages
            git rm -rf .
            echo "Documentation site" > README.md
            git add README.md
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Initialise gh-pages branch"
          fi

      - name: Determine target subdirectory
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "dir=released" >> $GITHUB_OUTPUT
          else
            echo "dir=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Copy documentation into gh-pages
        run: |
          TARGET="gh-pages/${{ steps.target.outputs.dir }}"
          rm -rf "$TARGET"
          mkdir -p "$TARGET"
          cp -r source/documentation/. "$TARGET/"

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Deploy documentation from ${{ github.ref_name }} @ ${{ github.sha }}"
            git push origin gh-pages
          fi
